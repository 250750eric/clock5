<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Clock Elite 5.3 - Ultimate Edition</title>
    <style>
        :root { --bg-color: #000; --main-color: #fff; --accent-color: #00e5ff; --weather-color: #00ff41; --agi-color: #ff4500; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-color); color: var(--main-color); font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        
        #close-btn {
            position: fixed; top: 12px; right: 12px;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 99999; font-size: 22px; color: #aaa;
            transition: background 0.2s, color 0.2s;
        }
        #close-btn:active { background: rgba(255,80,80,0.35); color: #fff; }

        #main-wrapper { 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: transform 0.8s ease-in-out;
        }

        #top-info-area { font-size: 4vh; margin-bottom: 1vh; text-align: center; cursor: pointer; z-index: 10; }
        #guide-tip { font-size: 1.8vh; color: #888; margin-bottom: 1vh; opacity: 0; transition: opacity 1s; }
        
        #clock-container { display: flex; align-items: center; font-weight: bold; line-height: 0.9; cursor: pointer; user-select: none; }

        @keyframes clockPulse {
            0%   { opacity: 1; transform: scale(1); }
            40%  { opacity: 0.6; transform: scale(1.03); }
            100% { opacity: 1; transform: scale(1); }
        }
        #clock-container.speaking { animation: clockPulse 0.4s ease-out; }

        #speak-toast {
            position: fixed; bottom: 22vh; left: 50%; transform: translateX(-50%);
            background: rgba(0,229,255,0.15); border: 1px solid rgba(0,229,255,0.4);
            color: #00e5ff; font-size: 2vh; padding: 0.6vh 2.5vw; border-radius: 999px;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            white-space: nowrap; z-index: 100;
        }
        #speak-toast.show { opacity: 1; }
        .time-num { font-size: 38vh; transition: color 0.5s; }
        
        #colon-box { width: 12vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #ampm-indicator { height: 4vh; font-size: 3vh; }
        .dot { width: 1.8vh; height: 1.8vh; background-color: currentColor; border-radius: 50%; }
        #seconds { font-size: 8vh; opacity: 0.6; margin-top: 1vh; font-family: monospace; }
        
        #weather-area { cursor: pointer; text-align: center; transition: opacity 0.2s; }
        #weather-area:active { opacity: 0.6; }
        #weather-row { display: flex; gap: 15px; font-size: 4.5vh; margin-top: 2vh; font-weight: bold; }
        #aqi-row { font-size: 3.2vh; margin-top: 1vh; font-weight: bold; }
        #city { color: var(--accent-color); }
        #weather-detail { color: var(--weather-color); }

        #agi-container { margin-top: 3vh; font-size: 2vh; color: #444; font-family: monospace; letter-spacing: 1px; }
        #agi-timer { color: var(--agi-color); font-weight: bold; opacity: 0.8; }

        .side-btn { 
            position: absolute; bottom: 5vh; width: 85px; height: 85px; 
            border: 1px solid #444; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: rgba(0,0,0,0.6); 
            border-radius: 12px; cursor: pointer; z-index: 20;
        }
        #format-toggle { left: 5vw; }
        #voice-toggle { right: 5vw; }

        #schedule-panel {
            position: absolute; bottom: 16vh; right: 5vw; width: 220px;
            background: rgba(20, 20, 20, 0.95); border: 1px solid #00ff41;
            padding: 15px; border-radius: 15px; display: none; z-index: 30;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .range-group { margin: 10px 0; }
        .range-label { font-size: 14px; color: #00ff41; margin-bottom: 5px; display: flex; justify-content: space-between; }
        input[type=range] { width: 100%; accent-color: #00ff41; }

        #overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; 
            color: #fff; cursor: pointer; text-align: center;
        }

        @media (orientation: portrait) { 
            .time-num { font-size: 26vw; } #top-info-area { font-size: 5vw; } 
            #weather-row { font-size: 5.5vw !important; flex-direction: column; align-items: center; gap: 5px !important; } 
            #aqi-row { font-size: 4.5vw !important; }
            #seconds { font-size: 8vw !important; }
            #agi-container { font-size: 3.5vw; }
        }
    </style>
</head>
<body>

    <div id="close-btn" onclick="closeApp(event)" title="關閉">✕</div>

    <div id="overlay" onclick="unlockAudio()">
        <div style="font-size: 28px; font-weight: bold; margin-bottom: 15px;">GPS Clock 5.3</div>
        <div style="font-size: 16px; color: #00e5ff;">點擊啟動 (全環境監測系統)</div>
        <div style="font-size: 14px; color: #666; margin-top: 20px;">點擊 GPS 區域聽取完整報告</div>
    </div>

    <div id="main-wrapper">
        <div id="top-info-area" onclick="changeColor(event)">
            <div id="date-str"></div>
            <div id="lunar-str"></div>
        </div>
        <div id="guide-tip">💡 點擊日期切換配色 | 點擊 GPS 區聽取報告</div>

        <div id="clock-container" onclick="speakTime(event)">
            <div class="time-num" id="hh">00</div>
            <div id="colon-box">
                <div id="ampm-indicator"><div class="dot"></div></div>
                <div id="seconds">00</div>
            </div>
            <div class="time-num" id="mm">00</div>
        </div>
        <div id="speak-toast">🔊 語音報時中...</div>

        <div id="weather-area" onclick="speakFullEnvironment(event)">
            <div id="weather-row">
                <div id="city">定位中...</div>
                <div id="weather-detail">數據載入中...</div>
            </div>
            <div id="aqi-row">空氣品質檢測中...</div>
        </div>

        <div id="agi-container">
            距Kurzweil AGI 臨界點剩餘：<span id="agi-timer">計算中...</span>
        </div>
    </div>

    <div id="schedule-panel" onclick="event.stopPropagation()">
        <div style="text-align: center; font-weight: bold; margin-bottom: 10px; color: #fff;">自定報時區間</div>
        <div class="range-group">
            <div class="range-label"><span>開始:</span><span id="start-val">08:00</span></div>
            <input type="range" id="start-hour" min="0" max="23" value="8" oninput="updateScheduleDisplay()">
        </div>
        <div class="range-group">
            <div class="range-label"><span>結束:</span><span id="end-val">22:00</span></div>
            <input type="range" id="end-hour" min="0" max="23" value="22" oninput="updateScheduleDisplay()">
        </div>
    </div>

    <div id="format-toggle" class="side-btn" onclick="toggleFormat(event)">
        <div id="f-status" style="font-size: 20px; color: #00e5ff;">24H制</div>
        <div style="font-size: 12px; color: #888;">進制</div>
    </div>

    <div id="voice-toggle" class="side-btn" onclick="toggleVoice(event)">
        <div id="v-status" style="font-size: 18px; color: #ff9800;">全天</div>
        <div id="v-sub" style="font-size: 12px; color: #888;">報時</div>
    </div>

    <script>
        let lastHour = -1, colorIdx = 0;
        const colors = ['#ffffff', '#ff9800', '#00e5ff', '#00ff41', '#d500f9'];

        const synth = window.speechSynthesis;
        let ttsReady = false;

        function initTTS() {
            if (!synth) return;
            const checkVoices = () => {
                if (synth.getVoices().length > 0) {
                    ttsReady = true;
                }
            };
            checkVoices();
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = checkVoices;
            }
        }

        let voiceMode = parseInt(localStorage.getItem('gps_voiceMode')) || 1; 
        let startH = parseInt(localStorage.getItem('gps_startH')) || 8;
        let endH = parseInt(localStorage.getItem('gps_endH')) || 22;
        let use24Hour = (localStorage.getItem('gps_use24H') !== 'false'); 
        let lastDate = -1;
        const weeks = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];

        let currentWeatherData = { city: "定位中", temp: "--", humid: "--", desc: "等待更新", aqi: "--", aqiDesc: "" };

        function saveSettings() {
            localStorage.setItem('gps_voiceMode', voiceMode);
            localStorage.setItem('gps_startH', startH);
            localStorage.setItem('gps_endH', endH);
            localStorage.setItem('gps_use24H', use24Hour);
        }

        // === 恢復農曆功能 ===
        function getLunarText(d) {
            try {
                const f = new Intl.DateTimeFormat('zh-u-ca-chinese', {day:'numeric', month:'long'}).format(d);
                const c = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
                return "農曆 " + f.replace(/\d+/, n => {
                    let v = parseInt(n);
                    return v <= 10 ? "初"+c[v] : v < 20 ? "十"+c[v%10] : v==20 ? "二十" : "廿"+c[v%10];
                });
            } catch (e) { return ''; }
        }

        // === 恢復完整的日期顯示功能 ===
        function updateDateDisplay(now) {
            const today = now.getDate();
            if (today !== lastDate) {
                lastDate = today;
                document.getElementById('date-str').innerText = `${now.getFullYear()}年${now.getMonth() + 1}月${today}日 ${weeks[now.getDay()]}`;
                document.getElementById('lunar-str').innerText = getLunarText(now);
            }
        }

        // === 全局點擊監聽：點擊空白處關閉定時面板 ===
        document.addEventListener('click', function(e) {
            const panel = document.getElementById('schedule-panel');
            const voiceBtn = document.getElementById('voice-toggle');
            if (panel.style.display === 'block' && !panel.contains(e.target) && !voiceBtn.contains(e.target)) {
                panel.style.display = 'none';
            }
        });

        function autoLocate() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => updateWeather(p.coords.latitude, p.coords.longitude),
                    (err) => {
                        console.log("GPS Blocked, using IP fallback");
                        fetch('https://ipapi.co/json/')
                            .then(r => r.json())
                            .then(d => {
                                if (d.latitude) updateWeather(d.latitude, d.longitude);
                                else fallbackToTaichung();
                            })
                            .catch(fallbackToTaichung);
                    },
                    { timeout: 5000 }
                );
            } else {
                fallbackToTaichung();
            }
        }

        function fallbackToTaichung() { updateWeather(24.1269, 120.7067); }

        async function updateWeather(lat, lon) {
            try {
                const [geoRes, weatherRes, aqiRes] = await Promise.allSettled([
                    fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`).then(r => r.json()),
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&timezone=auto`).then(r => r.json()),
                    fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=demo`).then(r => r.json())
                ]);
                if (geoRes.status === 'fulfilled') {
                    currentWeatherData.city = geoRes.value.city || geoRes.value.locality || "未知城市";
                    document.getElementById('city').innerText = currentWeatherData.city;
                }
                if (weatherRes.status === 'fulfilled') {
                    const w = weatherRes.value.current;
                    const map = {0:"晴朗", 1:"晴", 2:"多雲", 3:"陰天", 45:"霧", 61:"小雨", 95:"雷雨"};
                    currentWeatherData.desc = map[w.weather_code] || "多雲";
                    currentWeatherData.temp = Math.round(w.temperature_2m);
                    currentWeatherData.humid = w.relative_humidity_2m;
                    document.getElementById('weather-detail').innerText = `${currentWeatherData.desc} ${currentWeatherData.temp}°C / 濕度 ${currentWeatherData.humid}%`;
                }
                if (aqiRes.status === 'fulfilled' && aqiRes.value.status === "ok") {
                    const v = aqiRes.value.data.aqi;
                    currentWeatherData.aqi = v;
                    currentWeatherData.aqiDesc = v > 100 ? "不佳" : (v > 50 ? "普通" : "良好");
                    const el = document.getElementById('aqi-row');
                    el.style.color = v > 100 ? "#ff9800" : (v > 50 ? "#ffeb3b" : "#00ff41");
                    el.innerText = `AQI 空氣質量: ${v} (${currentWeatherData.aqiDesc})`;
                }
            } catch (e) { console.log("Weather sync failed"); }
        }

        function unlockAudio() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('schedule-panel').style.display = 'none'; // 進入時強制隱藏面板
            autoLocate();
            speak("系統啟動", true);
        }

        function speak(text, force = false) {
            if (!force && !isVoiceAllowedNow()) return;
            if (!synth) return;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            const voices = synth.getVoices();
            const zhVoice = voices.find(v => v.lang.includes('zh'));
            if (zhVoice) u.voice = zhVoice;
            synth.speak(u);
        }

        function speakFullEnvironment(e) {
            e.stopPropagation();
            const now = new Date();
            let hh = now.getHours(), mm = now.getMinutes();
            const period = hh < 12 ? "上午" : (hh === 12 ? "中午" : "下午");
            const sh = hh > 12 ? hh - 12 : (hh === 0 ? 12 : hh);
            const report = `現在時間${period}${sh}點${mm === 0 ? '整' : mm + '分'}。目前位置${currentWeatherData.city}，天氣${currentWeatherData.desc}，氣溫${currentWeatherData.temp}度，空氣品質${currentWeatherData.aqi}${currentWeatherData.aqiDesc}。`;
            speak(report, true);
            const toast = document.getElementById('speak-toast');
            toast.innerText = "🔊 讀取環境報告中...";
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function isVoiceAllowedNow() {
            if (voiceMode === 0) return false;
            if (voiceMode === 1) return true;
            const hr = new Date().getHours();
            return (startH < endH) ? (hr >= startH && hr < endH) : (hr >= startH || hr < endH);
        }

        function speakTime(e) {
            e.stopPropagation();
            const now = new Date();
            let hh = now.getHours(), mm = now.getMinutes();
            const period = hh < 12 ? "上午" : (hh === 12 ? "中午" : "下午");
            const sh = hh > 12 ? hh - 12 : (hh === 0 ? 12 : hh);
            speak(`現在時間，${period}${sh}點${mm === 0 ? "整" : mm + "分"}`, true); 
            document.getElementById('clock-container').classList.add('speaking');
            const toast = document.getElementById('speak-toast');
            toast.innerText = "🔊 語音報時中...";
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); document.getElementById('clock-container').classList.remove('speaking'); }, 2000);
        }

        function toggleFormat(e) {
            e.stopPropagation();
            use24Hour = !use24Hour;
            saveSettings();
            document.getElementById('f-status').innerText = use24Hour ? "24H制" : "12H制";
            speak("切換" + (use24Hour ? "24小時制" : "12小時制"), true);
            tick();
        }

        function toggleVoice(e) {
            e.stopPropagation();
            voiceMode = (voiceMode + 1) % 3;
            saveSettings();
            updateVoiceUI();
            
            if (voiceMode === 2) {
                speak(`定時模式，${startH}點至${endH}點`, true);
            } else {
                const msgs = ["報時已關閉", "報時全天開啟"];
                speak(msgs[voiceMode], true);
            }
        }

        // === 修復：精準控制定時面板的顯示與隱藏 ===
        function updateVoiceUI() {
            const s = document.getElementById('v-status'), sub = document.getElementById('v-sub');
            const panel = document.getElementById('schedule-panel');
            
            if (voiceMode === 2) {
                s.innerText = "定時"; s.style.color = "#00ff41";
                sub.innerText = `${startH}-${endH}時`;
                panel.style.display = 'block'; // 只有切換到定時模式才展開
            } else {
                panel.style.display = 'none'; // 其他模式強制收起
                if (voiceMode === 1) { 
                    s.innerText = "全天"; s.style.color = "#ff9800"; sub.innerText = "報時"; 
                } else { 
                    s.innerText = "關閉"; s.style.color = "#888"; sub.innerText = "靜音"; 
                }
            }
        }

        function updateScheduleDisplay() {
            startH = parseInt(document.getElementById('start-hour').value);
            endH = parseInt(document.getElementById('end-hour').value);
            saveSettings(); 
            document.getElementById('start-val').innerText = String(startH).padStart(2, '0') + ":00";
            document.getElementById('end-val').innerText = String(endH).padStart(2, '0') + ":00";
            document.getElementById('v-sub').innerText = `${startH}-${endH}時`;
        }

        // === 恢復完整的 AGI 倒數邏輯 ===
        function updateAGI() {
            const target = new Date("2029-12-07T00:00:00").getTime();
            const now = Date.now();
            const diff = target - now;
            const d = Math.max(0, Math.floor(diff / 86400000));
            const h = Math.max(0, Math.floor((diff % 86400000) / 3600000));
            document.getElementById('agi-timer').innerText = (diff <= 0) ? "LIMIT REACHED" : `${d} 天 ${h} 小時`;
        }

        function changeColor(e) { 
            e.stopPropagation(); 
            colorIdx = (colorIdx + 1) % colors.length; 
            document.documentElement.style.setProperty('--main-color', colors[colorIdx]); 
            speak("切換配色", true); 
        }

        function closeApp(e) {
            e.stopPropagation();
            window.close();
            document.body.style.opacity = '0';
        }

        function tick() {
            const now = new Date();
            let hh = now.getHours(), mm = now.getMinutes(), ss = now.getSeconds();
            const ind = document.getElementById('ampm-indicator');
            if (use24Hour) { ind.innerHTML = '<div class="dot"></div>'; } 
            else { ind.innerText = hh >= 12 ? "下午" : "上午"; ind.style.fontSize = "2.5vh"; }
            document.getElementById('hh').innerText = String(use24Hour ? hh : (hh % 12 || 12)).padStart(2, '0');
            document.getElementById('mm').innerText = String(mm).padStart(2, '0');
            document.getElementById('seconds').innerText = String(ss).padStart(2, '0');
            
            updateDateDisplay(now);
            updateAGI();

            if (mm === 0 && ss === 0 && hh !== lastHour) {
                lastHour = hh;
                let p = hh < 12 ? "上午" : (hh === 12 ? "中午" : "下午"), sh = hh > 12 ? hh - 12 : (hh === 0 ? 12 : hh);
                speak(`現在時間，${p}${sh}點整`);
                autoLocate();
            }
        }

        window.onload = () => { 
            initTTS();
            updateVoiceUI(); 
            // 進入網頁時，如果原本是定時模式，初始化UI後強制收起面板，不要擋住畫面
            document.getElementById('schedule-panel').style.display = 'none';
            document.getElementById('start-hour').value = startH;
            document.getElementById('end-hour').value = endH;
            tick(); setInterval(tick, 1000); 
        };
    </script>
</body>
</html>();
